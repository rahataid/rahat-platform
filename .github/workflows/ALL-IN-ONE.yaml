name: AA ALL-IN-ONE

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (test-load, dev-unicef, redcross, aidlink-demo, aidlink-dev, main-aa)"
        required: true
        type: string

      apps_to_build:
        description: "Apps to build (leave empty for defaults)"
        required: false
        type: string

concurrency:
  group: aa-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: false
  NODE_VERSION: "20.10.0"
  PNPM_VERSION: "8.14.1"
  REGISTRY: docker.io
  IMAGE_NAMESPACE: esatya

jobs:
  resolve-config:
    name: Resolve Environment Config
    runs-on: ubuntu-latest
    outputs:
      tag_suffix: ${{ steps.config.outputs.tag_suffix }}
      env_secret_name: ${{ steps.config.outputs.env_secret_name }}
      apps_to_build: ${{ steps.config.outputs.apps_to_build }}
    steps:
      - name: Resolve config from branch or manual input
        id: config
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            ENV="${{ github.ref_name }}"
          else
            ENV="${{ inputs.environment }}"
          fi

          case "$ENV" in
            test-load)
              TAG="test-load"
              SECRET="ENV_AA_TEST_LOAD"
              APPS="beneficiary,rahat"
              ;;
            dev-unicef)
              TAG="dev-unicef"
              SECRET="ENV_AA_DEV_UNICEF"
              APPS="beneficiary,rahat"
              ;;
            redcross)
              TAG="redcross"
              SECRET="ENV_AA_REDCROSS"
              APPS="beneficiary,rahat"
              ;;
            aidlink-demo)
              TAG="aidlink-demo"
              SECRET="ENV_AA_AIDLINK_DEMO"
              APPS="beneficiary,rahat"
              ;;
            aidlink-dev)
              TAG="aidlink-dev"
              SECRET="ENV_AA_AIDLINK_DEV"
              APPS="beneficiary,rahat"
              ;;
            stage-el)
              TAG="stage-el"
              SECRET="ENV_AA_STAGE_EL"
              APPS="beneficiary,rahat"
              ;;
            main|main-aa)
              TAG="latest"
              SECRET="ENV_AA_MAIN"
              APPS="beneficiary,rahat"
              ;;
            *)
              echo "Unknown environment: $ENV"
              exit 1
              ;;
          esac

          # Allow manual override of apps
          if [ -n "${{ inputs.apps_to_build }}" ]; then
            APPS="${{ inputs.apps_to_build }}"
          fi

          echo "tag_suffix=$TAG" >> $GITHUB_OUTPUT
          echo "env_secret_name=$SECRET" >> $GITHUB_OUTPUT
          echo "apps_to_build=$APPS" >> $GITHUB_OUTPUT

  # -----------------------------
  # Build Matrix Setup
  # -----------------------------
  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-latest
    needs: resolve-config
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate matrix
        id: set-matrix
        run: |
          APPS="${{ needs.resolve-config.outputs.apps_to_build }}"
          JSON=$(printf '%s\n' "$APPS" | awk -F',' '{printf "["; for(i=1;i<=NF;i++) printf "\"%s\"%s",$i,(i==NF?"":","); printf "]"}')
          echo "matrix={\"app\":$JSON}" >> $GITHUB_OUTPUT

  # -----------------------------
  # Build & Push
  # -----------------------------
  build:
    name: Build & Push - ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: [resolve-config, setup]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Node + PNPM Setup
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      # -----------------------------
      # Inject Environment
      # -----------------------------
      - name: Inject Environment File
        run: |
          echo "${{ secrets[needs.resolve-config.outputs.env_secret_name] }}" > .env

      - name: Install Dependencies
        run: |
          pnpm install
          pnpm prisma:generate

      - name: Build Application
        run: npx nx build ${{ matrix.app }}

      # -----------------------------
      # Vault Import
      # -----------------------------
      - name: Import Secrets from Vault
        id: vault
        uses: hashicorp/vault-action@v2.4.0
        with:
          url: ${{ secrets.VAULT_URL }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            github/data/general/docker/esatya username | DOCKERHUB_USERNAME ;
            github/data/general/docker/esatya password | DOCKERHUB_TOKEN ;

      # -----------------------------
      # Docker Setup
      # -----------------------------
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.vault.outputs.DOCKERHUB_USERNAME }}
          password: ${{ steps.vault.outputs.DOCKERHUB_TOKEN }}

      - name: Extract Git Metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "run_number=${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      # -----------------------------
      # Docker Build & Push
      # -----------------------------
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.app }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/rahat-platform-${{ matrix.app }}:${{ needs.resolve-config.outputs.tag_suffix }}
            ${{ env.IMAGE_NAMESPACE }}/rahat-platform-${{ matrix.app }}:${{ needs.resolve-config.outputs.tag_suffix }}-${{ steps.meta.outputs.short_sha }}-${{ steps.meta.outputs.run_number }}
